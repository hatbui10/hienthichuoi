<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm theo khối số</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            display: flex; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: #101216;
            color: #fff;
        }

        .container {
            width: 98%;
            max-width: 500px;
            margin: 10px auto;
            text-align: center;
        }

        /* Vùng tải file */
        .file-upload {
            background: #1c1f26;
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #444;
            margin-bottom: 20px;
        }
        input[type="file"] { font-size: 0.8rem; color: #888; }

        /* Ô nhập số to giữa màn hình */
        #numInput {
            width: 80%;
            height: 80px;
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            border: 3px solid #ff4757;
            border-radius: 15px;
            background: #000;
            color: #ff4757;
            outline: none;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }

        /* Khu vực hiển thị kết quả quét được */
        #resultArea {
            text-align: left;
            background: #252a33;
            border-radius: 12px;
            padding: 5px 15px;
            display: none; /* Chỉ hiện khi có kết quả */
            border: 1px solid #333;
        }

        .result-item {
            padding: 12px 0;
            border-bottom: 1px solid #383e4a;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .result-item:last-child { border-bottom: none; }

        /* Đánh dấu 2 số đầu dòng cho dễ nhìn */
        .highlight { color: #ffbc00; font-weight: bold; }

        .status-msg { color: #666; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="file-upload">
        <div style="margin-bottom: 10px; font-size: 0.9rem;">Nạp dữ liệu từ file .txt</div>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <input type="text" id="numInput" maxlength="2" placeholder="--" inputmode="numeric" autofocus autocomplete="off">
    
    <div id="resultArea"></div>

    <div class="status-msg" id="infoText">Vui lòng chọn file trước khi nhập</div>
</div>

<script>
    let allLines = []; // Lưu danh sách các dòng từ file
    const fileInput = document.getElementById('fileInput');
    const numInput = document.getElementById('numInput');
    const resultArea = document.getElementById('resultArea');
    const infoText = document.getElementById('infoText');

    // 1. Đọc và xử lý file khi người dùng chọn
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            // Tách file thành mảng các dòng, lọc bỏ dòng trống
            allLines = content.split(/\r?\n/).filter(line => line.trim() !== "");
            alert("Đã nạp thành công " + allLines.length + " dòng dữ liệu!");
            infoText.innerText = "Dữ liệu sẵn sàng. Hãy nhập 2 số.";
            numInput.focus();
        };
        reader.readAsText(file);
    });

    // 2. Xử lý logic khi nhập vào ô input
    numInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, ''); // Chỉ cho phép nhập số
        
        const searchVal = this.value;

        // Khi đã nhập đủ 2 chữ số
        if (searchVal.length === 2) {
            if (allLines.length === 0) {
                alert("Bạn chưa nạp file dữ liệu!");
                this.value = "";
                return;
            }

            // Tìm các dòng bắt đầu bằng searchVal
            const matches = allLines.filter(line => line.trim().startsWith(searchVal));

            if (matches.length > 0) {
                resultArea.innerHTML = ""; // Xóa kết quả cũ
                resultArea.style.display = "block";

                matches.forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    
                    // Highlight 2 số đầu
                    const prefix = line.substring(0, 2);
                    const rest = line.substring(2);
                    div.innerHTML = `<span class="highlight">${prefix}</span>${rest}`;
                    
                    resultArea.appendChild(div);
                });

                // Tự động copy "[Số]x" như yêu cầu cũ của bạn
                const copyStr = searchVal + "x";
                navigator.clipboard.writeText(copyStr).then(() => {
                    infoText.innerHTML = `Đã tìm thấy ${matches.length} dòng. <b style="color:#00ff88">Copy: ${copyStr}</b>`;
                });

            } else {
                resultArea.style.display = "none";
                infoText.innerText = "Không tìm thấy khối: " + searchVal;
            }

            // Tự động xóa để nhập lượt mới sau 1 giây
            setTimeout(() => {
                this.value = "";
                this.focus();
            }, 1000);
        }
    });

    // Luôn giữ focus vào ô nhập
    document.addEventListener('click', (e) => {
        if (e.target !== fileInput) numInput.focus();
    });
</script>

</body>
</html>
